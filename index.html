<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste Sorter AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .active-tab {
            border-bottom: 4px solid #10b981;
            color: #10b981;
        }

        video,
        #user-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes score-up {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
                color: #10b981;
            }

            100% {
                transform: scale(1);
            }
        }

        .score-anim {
            animation: score-up 0.3s ease-out;
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen">

    <nav class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-md mx-auto flex justify-between items-center px-4">
            <div class="flex flex-1">
                <button onclick="openTab('ai-tab', this)" id="nav-scan" class="py-4 px-4 font-bold active-tab">📸
                    สแกนขยะ</button>
                <button onclick="openTab('game-tab', this)" id="nav-game" class="py-4 px-4 font-bold text-gray-500">🎮
                    เกม</button>
            </div>
            <button onclick="toggleLang()"
                class="bg-gray-100 border border-gray-300 px-3 py-1 rounded-full text-xs font-bold active:bg-gray-200 transition">
                <span id="lang-text">EN | TH</span>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <div id="ai-tab" class="tab-content active">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <div id="video-holder"
                    class="relative bg-gray-200 rounded-xl overflow-hidden aspect-square flex items-center justify-center mb-4">
                    <img id="user-image" class="hidden" alt="Uploaded">
                    <div id="loading-container" class="text-center p-6">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500 mx-auto mb-4"></div>
                        <p id="txt-loading" class="text-gray-500 font-medium italic">---</p>
                    </div>
                </div>
                <div id="controls"
                    class="flex gap-2 mb-4 opacity-50 pointer-events-none transition-opacity duration-500">
                    <button onclick="restartCamera()" id="txt-btn-cam"
                        class="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold text-sm active:scale-95 transition">🔄
                        Live Cam</button>
                    <label
                        class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm text-center cursor-pointer active:scale-95 transition">
                        <span id="txt-btn-upload">📁 Upload</span>
                        <input type="file" accept="image/*" class="hidden" onchange="handleFileUpload(event)">
                    </label>
                </div>
                <div id="result-box"
                    class="p-4 rounded-xl text-center bg-gray-100 min-h-[100px] flex flex-col justify-center">
                    <p id="label" class="text-2xl font-black text-gray-800 uppercase">---</p>
                    <p id="bin-advice" class="mt-1 font-bold text-lg"></p>
                </div>
            </div>
        </div>

        <div id="game-tab" class="tab-content">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 text-center">
                <div class="flex justify-between items-center mb-6">
                    <div class="text-left">
                        <p id="txt-score-label" class="text-xs text-gray-400 font-bold">SCORE</p>
                        <p id="score" class="text-3xl font-black text-green-600">0</p>
                    </div>
                    <div class="text-right">
                        <p id="txt-lives-label" class="text-xs text-gray-400 font-bold">LIVES</p>
                        <p id="lives-display" class="text-2xl">❤️❤️❤️</p>
                    </div>
                </div>
                <div class="bg-gray-50 h-48 rounded-3xl mb-6 flex flex-col items-center justify-center shadow-inner">
                    <span id="game-emoji" class="text-7xl mb-2 transition-transform duration-200">🥤</span>
                    <p id="game-hint" class="text-gray-400 text-sm italic font-medium">---</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="playGame('yellow')" id="btn-y"
                        class="bg-yellow-400 text-white py-4 rounded-xl font-bold active:scale-95 transition">---</button>
                    <button onclick="playGame('green')" id="btn-g"
                        class="bg-green-500 text-white py-4 rounded-xl font-bold active:scale-95 transition">---</button>
                    <button onclick="playGame('blue')" id="btn-b"
                        class="bg-blue-500 text-white py-4 rounded-xl font-bold active:scale-95 transition">---</button>
                    <button onclick="playGame('red')" id="btn-r"
                        class="bg-red-500 text-white py-4 rounded-xl font-bold active:scale-95 transition">---</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 1. Enhanced Multilingual Data ---
        let currentLang = 'th';
        const i18n = {
            th: {
                navScan: "📸 สแกนขยะ", navGame: "🎮 เกม", loading: "กำลังโหลดสมอง AI...",
                btnCam: "🔄 ใช้กล้องสด", btnUpload: "📁 เลือกรูปภาพ", ready: "พร้อมสแกนแล้ว!",
                score: "คะแนน", lives: "ชีวิต", hintPrefix: "ชิ้นนี้คือ: ",
                yellow: "รีไซเคิล (เหลือง)", green: "ขยะเปียก (เขียว)", blue: "ทั่วไป (น้ำเงิน)", red: "อันตราย (แดง)",
                wrong: "ยังไม่ถูก!", belongs: "ต้องทิ้งถังสี", gameover: "จบเกม! คะแนนของคุณคือ: ", unsure: "มองไม่ชัด... ลองอีกครั้ง",
                btnY: "เหลือง", btnG: "เขียว", btnB: "น้ำเงิน", btnR: "แดง"
            },
            en: {
                navScan: "📸 Scan", navGame: "🎮 Game", loading: "AI Loading...",
                btnCam: "🔄 Live Cam", btnUpload: "📁 Upload", ready: "Ready to Scan!",
                score: "SCORE", lives: "LIVES", hintPrefix: "This is: ",
                yellow: "Recyclable (Yellow)", green: "Organic (Green)", blue: "General (Blue)", red: "Hazardous (Red)",
                wrong: "Incorrect!", belongs: "It belongs to: ", gameover: "Game Over! Your score: ", unsure: "Unsure... Try again",
                btnY: "Yellow", btnG: "Green", btnB: "Blue", btnR: "Red"
            }
        };

        const gameItems = [
            { emoji: '🍎', bin: 'green', th: 'เศษแอปเปิ้ล', en: 'Apple Core' },
            { emoji: '📰', bin: 'yellow', th: 'หนังสือพิมพ์', en: 'Newspaper' },
            { emoji: '🔋', bin: 'red', th: 'ถ่านไฟฉาย', en: 'Battery' },
            { emoji: '🍪', bin: 'blue', th: 'ซองขนม', en: 'Snack Bag' },
            { emoji: '🥤', bin: 'yellow', th: 'แก้วพลาสติก', en: 'Plastic Cup' },
            { emoji: '💡', bin: 'red', th: 'หลอดไฟ', en: 'Light Bulb' },
            { emoji: '🦴', bin: 'green', th: 'เศษกระดูก', en: 'Bone scrap' }
        ];

        let classifier, video, isModelReady = false, isUsingCamera = false;
        let score = 0, lives = 3, currentItem;

        // --- 2. UI & Language Logic ---
        function toggleLang() {
            currentLang = currentLang === 'th' ? 'en' : 'th';
            updateUIStrings();
            if (currentItem) updateGameHint();
        }

        function updateUIStrings() {
            const t = i18n[currentLang];
            document.getElementById('nav-scan').innerText = t.navScan;
            document.getElementById('nav-game').innerText = t.navGame;
            const loadMsg = document.getElementById('txt-loading');
            if (loadMsg) loadMsg.innerText = t.loading;
            document.getElementById('txt-btn-cam').innerText = t.btnCam;
            document.getElementById('txt-btn-upload').innerText = t.btnUpload;
            document.getElementById('txt-score-label').innerText = t.score;
            document.getElementById('txt-lives-label').innerText = t.lives;
            document.getElementById('btn-y').innerText = t.btnY;
            document.getElementById('btn-g').innerText = t.btnG;
            document.getElementById('btn-b').innerText = t.btnB;
            document.getElementById('btn-r').innerText = t.btnR;
            if (isModelReady && !isUsingCamera) document.getElementById('label').innerText = t.ready;
        }

        // --- 3. AI & Camera Logic ---
        async function setup() {
            updateUIStrings();
            video = document.createElement('video');
            video.setAttribute('autoplay', ''); video.setAttribute('muted', ''); video.setAttribute('playsinline', '');

            classifier = ml5.imageClassifier('MobileNet', () => {
                isModelReady = true;
                document.getElementById('controls').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('label').innerText = i18n[currentLang].ready;
                startCamera();
            });
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                const holder = document.getElementById('video-holder');
                const loader = document.getElementById('loading-container');
                if (loader) loader.remove();
                holder.prepend(video);
                isUsingCamera = true;
                classifyVideo();
            } catch (err) {
                console.error(err);
            }
        }

        function classifyVideo() {
            if (isModelReady && isUsingCamera) {
                classifier.classify(video, (err, results) => {
                    if (results) processResults(results);
                    requestAnimationFrame(classifyVideo);
                });
            }
        }

        function processResults(results) {
            const label = results[0].label.toLowerCase();
            document.getElementById('label').innerText = label.split(',')[0];

            const binMapping = {
            // --- IT & Electronics (Red Bin) ---
            'mouse': 'red', 'keyboard': 'red', 'laptop': 'red', 'notebook': 'red', 
            'monitor': 'red', 'screen': 'red', 'cellular telephone': 'red', 'ipod': 'red',
            'hard disc': 'red', 'modem': 'red', 'joystick': 'red', 'loudspeaker': 'red',
            'electric fan': 'red', 'iron': 'red', 'microwave': 'red', 'battery': 'red',
            // --- Recyclables (Yellow) ---
            'bottle': 'yellow', 'can': 'yellow', 'paper': 'yellow', 'cardboard': 'yellow', 'cup': 'yellow',
            // --- Organic (Green) ---
            'banana': 'green', 'apple': 'green', 'orange': 'green', 'broccoli': 'green', 'lemon': 'green',
            // --- General (Blue) ---
            'packet': 'blue', 'snack': 'blue', 'tissue': 'blue', 'plastic bag': 'blue'
        };

            let found = false;
            for (let key in binMapping) {
                if (label.includes(key)) {
                    const color = binMapping[key];
                    const t = i18n[currentLang];
                    const box = document.getElementById('result-box');
                    const config = {
                        yellow: { name: t.yellow, bg: 'bg-yellow-100', text: 'text-yellow-700' },
                        green: { name: t.green, bg: 'bg-green-100', text: 'text-green-700' },
                        blue: { name: t.blue, bg: 'bg-blue-100', text: 'text-blue-700' },
                        red: { name: t.red, bg: 'bg-red-100', text: 'text-red-700' }
                    };
                    box.className = `p-4 rounded-xl text-center ${config[color].bg} ${config[color].text}`;
                    document.getElementById('bin-advice').innerText = config[color].name;
                    found = true;
                    break;
                }
            }
            if (!found) {
                document.getElementById('bin-advice').innerText = i18n[currentLang].unsure;
                document.getElementById('result-box').className = "p-4 rounded-xl text-center bg-gray-100";
            }
        }

        // --- 4. Game Logic (Fixed Multilingual Quiz) ---
        function nextItem() {
            currentItem = gameItems[Math.floor(Math.random() * gameItems.length)];
            document.getElementById('game-emoji').innerText = currentItem.emoji;
            updateGameHint();

            const emojiEl = document.getElementById('game-emoji');
            emojiEl.style.transform = 'scale(0.8)';
            setTimeout(() => emojiEl.style.transform = 'scale(1)', 100);
        }

        function updateGameHint() {
            const t = i18n[currentLang];
            const itemName = currentLang === 'th' ? currentItem.th : currentItem.en;
            document.getElementById('game-hint').innerText = `${t.hintPrefix}${itemName}`;
        }

        function playGame(color) {
            const t = i18n[currentLang];
            const scoreEl = document.getElementById('score');

            if (color === currentItem.bin) {
                score++;
                scoreEl.innerText = score;
                scoreEl.classList.add('score-anim');
                setTimeout(() => scoreEl.classList.remove('score-anim'), 300);
                nextItem();
            } else {
                lives--;
                updateLives();
                const correctBin = t[currentItem.bin];
                const itemName = currentLang === 'th' ? currentItem.th : currentItem.en;

                if (lives <= 0) {
                    alert(`${t.gameover} ${score}`);
                    score = 0; lives = 3;
                    scoreEl.innerText = score;
                    updateLives();
                } else {
                    alert(`${t.wrong} ${currentItem.emoji} (${itemName}) ${t.belongs} ${correctBin}`);
                }
                nextItem();
            }
        }

        function updateLives() {
            document.getElementById('lives-display').innerText = '❤️'.repeat(lives) + '🖤'.repeat(3 - lives);
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            isUsingCamera = false;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('user-image');
                img.src = e.target.result;
                img.classList.remove('hidden');
                if (video) video.classList.add('hidden');
                classifier.classify(img, (err, results) => { if (results) processResults(results); });
            };
            reader.readAsDataURL(file);
        }

        function restartCamera() {
            isUsingCamera = true;
            document.getElementById('user-image').classList.add('hidden');
            if (video) video.classList.remove('hidden');
            classifyVideo();
        }

        function openTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-tab', 'text-gray-500'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active-tab');
        }

        setup();
        nextItem();
        updateLives();
    </script>
</body>

</html>
