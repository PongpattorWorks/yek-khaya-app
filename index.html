<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Waste AI - Fixed Freeze Frame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>
    <style>
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .active-tab {
            border-bottom: 4px solid #10b981;
            color: #10b981;
        }

        /* จัดการ Layer ให้ซ้อนทับกันสมบูรณ์ */
        .camera-view {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 1rem;
            overflow: hidden;
        }

        #webcam,
        #canvas-capture,
        #user-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hidden {
            display: none !important;
        }

        @keyframes score-up {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        .score-anim {
            animation: score-up 0.3s ease;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto flex justify-between items-center px-4">
            <div class="flex flex-1">
                <button onclick="openTab('ai-tab', this)" id="nav-scan"
                    class="py-4 px-4 font-bold active-tab text-green-600">📸 สแกนขยะ</button>
                <button onclick="openTab('game-tab', this)" id="nav-game" class="py-4 px-4 font-bold text-gray-400">🎮
                    เกม</button>
            </div>
            <button onclick="toggleLang()"
                class="bg-gray-100 px-3 py-1 rounded-full text-xs font-bold border border-gray-300">
                <span id="lang-text">EN | TH</span>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <div id="ai-tab" class="tab-content active">
            <div class="bg-white p-4 rounded-3xl shadow-xl border border-gray-50">
                <div class="camera-view mb-4 shadow-inner">
                    <video id="webcam" autoplay muted playsinline></video>
                    <canvas id="canvas-capture" class="hidden"></canvas>
                    <img id="user-image" class="hidden">

                    <div id="loading-container"
                        class="absolute inset-0 flex flex-col items-center justify-center bg-gray-200 z-40">
                        <div class="animate-spin rounded-full h-10 w-10 border-4 border-green-500 border-t-transparent">
                        </div>
                    </div>

                    <div id="flash"
                        class="absolute inset-0 bg-white opacity-0 pointer-events-none z-50 transition-opacity duration-75">
                    </div>
                </div>

                <button id="btn-capture" onclick="takePicture()"
                    class="w-full bg-green-500 text-white py-5 rounded-2xl font-black text-xl shadow-lg shadow-green-200 active:scale-95 transition mb-6 hidden">
                    📸 <span id="txt-scan-now">สแกนเลย / SCAN NOW</span>
                </button>

                <div id="controls"
                    class="flex gap-2 mb-4 opacity-50 pointer-events-none transition-opacity duration-500">
                    <button onclick="retake()"
                        class="flex-1 bg-gray-800 text-white py-3 rounded-xl font-bold text-sm active:scale-95 transition">
                        🔄 <span id="txt-retake">ถ่ายใหม่ / Retake</span>
                    </button>
                    <label
                        class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold text-sm text-center cursor-pointer active:scale-95 transition">
                        📁 <span id="txt-upload">เลือกรูป / Upload</span>
                        <input type="file" accept="image/*" class="hidden" onchange="handleFile(event)">
                    </label>
                </div>

                <div id="result-box"
                    class="p-5 rounded-2xl text-center bg-gray-50 border border-gray-100 min-h-[110px] flex flex-col justify-center transition-colors duration-300">
                    <p id="label" class="text-2xl font-black text-gray-800 uppercase tracking-tight">---</p>
                    <p id="bin-advice" class="mt-1 font-bold text-lg"></p>
                </div>
            </div>
        </div>

        <div id="game-tab" class="tab-content">
        </div>
    </main>

    <script>
        let currentLang = 'th';
        const i18n = {
            th: { ready: "พร้อมสแกน!", unsure: "ไม่แน่ใจ... ลองสแกนอีกที", yellow: "รีไซเคิล (เหลือง)", green: "ขยะเปียก (เขียว)", blue: "ทั่วไป (น้ำเงิน)", red: "อันตราย/IT (แดง)" },
            en: { ready: "Ready to Scan!", unsure: "Not sure... try again", yellow: "Recyclable (Yellow)", green: "Organic (Green)", blue: "General (Blue)", red: "Hazard/IT (Red)" }
        };

        const binMapping = {
            'mouse': 'red', 'keyboard': 'red', 'laptop': 'red', 'notebook': 'red', 'cellular telephone': 'red',
            'bottle': 'yellow', 'can': 'yellow', 'paper': 'yellow', 'banana': 'green', 'apple': 'green',
            'packet': 'blue', 'snack': 'blue', 'tissue': 'blue'
        };

        let classifier, video, canvas, isModelReady = false;

        async function setup() {
            video = document.getElementById('webcam');
            canvas = document.getElementById('canvas-capture');

            classifier = ml5.imageClassifier('MobileNet', () => {
                isModelReady = true;
                document.getElementById('controls').classList.remove('opacity-50', 'pointer-events-none');
                startCamera();
            });
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    document.getElementById('loading-container').classList.add('hidden');
                    document.getElementById('btn-capture').classList.remove('hidden');
                    document.getElementById('label').innerText = i18n[currentLang].ready;
                };
            } catch (err) { alert("กรุณาอนุญาตให้เข้าถึงกล้อง"); }
        }

        function takePicture() {
            if (!isModelReady) return;

            // Flash effect
            const flash = document.getElementById('flash');
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 100);

            // วาดรูปลง Canvas
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // สลับการแสดงผล (โชว์ภาพค้าง)
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            document.getElementById('btn-capture').classList.add('hidden');

            // วิเคราะห์ภาพจาก Canvas
            classifier.classify(canvas, (err, results) => {
                if (results) displayResult(results);
            });
        }

        function retake() {
            canvas.classList.add('hidden');
            document.getElementById('user-image').classList.add('hidden');
            video.classList.remove('hidden');
            document.getElementById('btn-capture').classList.remove('hidden');
            document.getElementById('label').innerText = i18n[currentLang].ready;
            document.getElementById('bin-advice').innerText = "";
            document.getElementById('result-box').className = "p-5 rounded-2xl text-center bg-gray-50 border border-gray-100";
        }

        function displayResult(results) {
            const topResult = results[0].label.toLowerCase();
            document.getElementById('label').innerText = topResult.split(',')[0];

            let found = false;
            for (let key in binMapping) {
                if (topResult.includes(key)) {
                    updateResultBox(binMapping[key]);
                    found = true;
                    break;
                }
            }
            if (!found) {
                document.getElementById('bin-advice').innerText = i18n[currentLang].unsure;
                document.getElementById('result-box').className = "p-5 rounded-2xl text-center bg-gray-50";
            }
        }

        function updateResultBox(color) {
            const box = document.getElementById('result-box');
            const t = i18n[currentLang];
            const config = {
                yellow: { name: t.yellow, bg: 'bg-yellow-100', text: 'text-yellow-700' },
                green: { name: t.green, bg: 'bg-green-100', text: 'text-green-700' },
                blue: { name: t.blue, bg: 'bg-blue-100', text: 'text-blue-700' },
                red: { name: t.red, bg: 'bg-red-100', text: 'text-red-700' }
            };
            box.className = `p-5 rounded-2xl text-center ${config[color].bg} ${config[color].text} border-2 border-white shadow-inner`;
            document.getElementById('bin-advice').innerText = config[color].name;
        }

        function handleFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = document.getElementById('user-image');
                img.src = e.target.result;
                img.classList.remove('hidden');
                video.classList.add('hidden');
                canvas.classList.add('hidden');
                document.getElementById('btn-capture').classList.add('hidden');
                classifier.classify(img, (err, results) => { if (results) displayResult(results); });
            };
            reader.readAsDataURL(file);
        }

        function openTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab', 'text-green-600'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active-tab', 'text-green-600');
        }

        setup();
    </script>
</body>

</html>
